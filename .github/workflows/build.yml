on:
  push:
    branches:
      - master

jobs:
  format-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2-beta
        with:
          node-version: '14'
      - run: npm ci
      - name: Build bundles
        run: npm run build
      - name: Push build
        run: |
          git config --local user.email "zepatrik@users.noreply.github.com"
          git config --local user.name "zepatrik"
          git add distCli distAction
          git commit -a -m "autogen: build bundles" && git push "https://aeneasr:1860d4c84c197e33aa0e54d460882af0e710654e@github.com/ory/meta.git" HEAD:master || true
